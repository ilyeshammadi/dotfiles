format = """
$character\
$line_break\
 """

right_format = '$status'

[character]
format = '[ \$ ](fg:#54546d)'

[status]
style = "fg:#E82424"
format = '[$status]($style)'
disabled = false


# The following modules are customized for tmux status line
[directory]
style = "fg:#54546d"
format = "$read_only $symbol $path "
read_only = "[-]"

[git_branch]
symbol = ''
format = '| $symbol $branch(:$remote_branch) '

[kubernetes]
symbol = "󱃾 "
format = '| $symbol $cluster \($namespace\)'
disabled = false

[docker_context]
symbol = '󰡨 '
style = 'fg:#54546d'
format = '| $symbol $context '
disabled = false
only_with_files = false
